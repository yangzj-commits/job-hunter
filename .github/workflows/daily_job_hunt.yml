name: 求职雷达每日运行

on:
  schedule:
    - cron: '0 1 * * 2,3,4'   # 北京时间 周二/三/四 09:00
  workflow_dispatch:            # 支持手动触发

jobs:
  job-hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r job-hunter-v2/job-hunter-v2/requirements.txt

      - name: 运行求职雷达
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: cd job-hunter-v2/job-hunter-v2 && python main.py

      - name: 持久化历史记录（commit 回仓库）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job-hunter-v2/job-hunter-v2/data/*.json || true
          git diff --staged --quiet || git commit -m "chore: 更新求职历史记录 $(date +'%Y-%m-%d')"
          git push || true
