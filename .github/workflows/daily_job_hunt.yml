name: 求职雷达每日运行

on:
  schedule:
    - cron: '0 1 * * 2,3,4'
  workflow_dispatch:

jobs:
  job-hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 查看仓库结构（调试用）
        run: find . -name "requirements.txt" -o -name "main.py" | grep -v ".git" | sort

      - name: 检测项目根目录
        id: find_root
        run: |
          MAIN_PATH=$(find . -name "main.py" | grep -v ".git" | head -1)
          PROJECT_DIR=$(dirname "$MAIN_PATH")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "找到项目目录: $PROJECT_DIR"

      - name: 安装依赖
        run: pip install -r ${{ steps.find_root.outputs.PROJECT_DIR }}/requirements.txt

      - name: 运行求职雷达
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: cd ${{ steps.find_root.outputs.PROJECT_DIR }} && python main.py

      - name: 持久化历史记录
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "*/data/*.json" || true
          git diff --staged --quiet || git commit -m "chore: 更新求职历史记录 $(date +'%Y-%m-%d')"
          git push || true
